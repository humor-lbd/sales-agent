# 文件作用：提供网关切流示例，支持 Java 和 Python 版本并行灰度。
# 阅读这个文件时，建议先看分组，再看每个配置项会影响哪一层能力。

# upstream 配置：定义后端真实服务地址，供网关转发时复用。
upstream sales_agent_java {
    server 127.0.0.1:8080;
}

upstream sales_agent_python {
    server 127.0.0.1:8088;
}

# map 配置：根据请求头动态决定流量应该转发到哪个后端版本。
map $http_x_agent_version $agent_upstream {
    default sales_agent_java;
    python sales_agent_python;
}

# server 配置：定义当前网关对外暴露的入口规则。
server {
    listen 80;
    server_name _;
# location 配置：定义不同路径如何被转发到目标服务。

    location = /health {
        proxy_pass http://sales_agent_python/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /agent/ {
        proxy_pass http://$agent_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    location /py/agent/ {
        rewrite ^/py(/.*)$ $1 break;
        proxy_pass http://sales_agent_python;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}
